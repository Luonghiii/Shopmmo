<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Lấy mã 2FA - ShopMMO</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">
  <header class="topbar">
    <a class="brand" href="index.html">
      <span class="brand-name">← Quay lại Shop</span>
    </a>
  </header>

  <main>
    <section class="owner-card" style="margin-top: 20px;">
      <h1 style="font-size: 24px; margin-bottom: 10px;">Công cụ lấy mã 2FA 🔐</h1>
      <p class="owner-role">Dán mã Secret Key hoặc dùng link chứa mã để lấy 2FA.</p>
      
      <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 15px;">
        <input type="text" id="2faInput" class="input" style="width: 100%; text-transform: uppercase;" placeholder="Dán mã vào đây...">
        
        <button id="getOtpBtn" class="buybtn" style="width: 100%; height: 50px; font-size: 16px;">LẤY MÃ NGAY</button>

        <div id="resultContainer" style="display: none; border-top: 1px solid var(--stroke); padding-top: 20px;">
          <div class="label" style="text-align: center;">Chạm vào mã để copy:</div>
          <div id="resultBox" class="codebox" style="text-align: center; font-size: 42px; font-weight: 900; color: #d4af37; letter-spacing: 5px; margin: 10px 0; cursor: pointer;">
            000000
          </div>
          <div id="timer" class="muted" style="text-align: center;">
            Mã mới sau: <span id="seconds" style="font-weight: bold; color: #f5deb3;">30</span> giây
          </div>
          <div id="copyMsg" style="text-align: center; color: #2ecc71; display: none; margin-top: 5px;">Đã copy mã!</div>
        </div>
      </div>
    </section>
  </main>
</div>

<script>
  // Logic giải mã 2FA (Base32 + TOTP)
  const Base32 = {
    alphabet: "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567",
    decode(str) {
      str = str.toUpperCase().replace(/[^A-Z2-7]/g, "");
      if (!str) return null;
      let bits = "";
      for (let i = 0; i < str.length; i++) {
        let val = this.alphabet.indexOf(str[i]);
        if (val >= 0) bits += val.toString(2).padStart(5, '0');
      }
      let res = [];
      for (let i = 0; i + 8 <= bits.length; i += 8) {
        res.push(parseInt(bits.substr(i, 8), 2));
      }
      return new Uint8Array(res);
    }
  };

  async function getTOTP(secret) {
    try {
      const key = Base32.decode(secret);
      if (!key || key.length === 0) return null;
      const epoch = Math.floor(Date.now() / 1000);
      const time = Math.floor(epoch / 30);
      const msg = new Uint8Array(8);
      let t = time;
      for (let i = 7; i >= 0; i--) { msg[i] = t & 0xff; t = Math.floor(t / 256); }
      const cryptoKey = await crypto.subtle.importKey("raw", key, { name: "HMAC", hash: "SHA-1" }, false, ["sign"]);
      const signature = await crypto.subtle.sign("HMAC", cryptoKey, msg);
      const data = new Uint8Array(signature);
      const offset = data[data.length - 1] & 0xf;
      const otp = ((data[offset] & 0x7f) << 24 | (data[offset + 1] & 0xff) << 16 | (data[offset + 2] & 0xff) << 8 | (data[offset + 3] & 0xff)) % 1000000;
      return otp.toString().padStart(6, '0');
    } catch (e) { return null; }
  }

  const input = document.getElementById('2faInput');
  const btn = document.getElementById('getOtpBtn');
  const resultContainer = document.getElementById('resultContainer');
  const resultBox = document.getElementById('resultBox');
  const secondsEl = document.getElementById('seconds');
  const copyMsg = document.getElementById('copyMsg');

  async function updateOTP() {
    const val = input.value.trim();
    if (!val) return;
    const code = await getTOTP(val);
    if (code) {
      resultBox.textContent = code;
      resultContainer.style.display = 'block';
    }
  }

  // --- PHẦN MỚI: TỰ ĐỘNG LẤY MÃ TỪ URL ---
  window.onload = async () => {
    // Lấy phần sau dấu ? trong URL
    const urlParams = window.location.search.substring(1); 
    if (urlParams) {
      // Giải mã ký tự đặc biệt (như %20 là dấu cách)
      const cleanSecret = decodeURIComponent(urlParams).trim();
      input.value = cleanSecret; // Điền vào ô nhập
      await updateOTP(); // Tự động chạy lấy mã
    }
  };

  btn.addEventListener('click', updateOTP);

  resultBox.addEventListener('click', () => {
    navigator.clipboard.writeText(resultBox.textContent);
    copyMsg.style.display = 'block';
    setTimeout(() => { copyMsg.style.display = 'none'; }, 2000);
  });

  setInterval(() => {
    const timeLeft = 30 - (Math.floor(Date.now() / 1000) % 30);
    secondsEl.textContent = timeLeft;
    if (timeLeft === 30 && resultContainer.style.display === 'block') {
      updateOTP();
    }
  }, 1000);
</script>
</body>
</html>
